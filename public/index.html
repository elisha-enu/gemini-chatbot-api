<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Personal Health Assistant</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <div class="header-top">
          <h1>Health Assistant</h1>
          <button id="theme-toggle">🌙</button>
        </div>
        <p>Your smart daily health companion</p>
      </div>

      <!-- PROFILE -->
      <div class="profile">
        <div class="row">
          <div class="field">
            <label>Gender</label>
            <select id="gender" required>
              <option value="">Pilih</option>
              <option value="Male">Pria</option>
              <option value="Female">Wanita</option>
            </select>
          </div>

          <div class="field">
            <label>Age</label>
            <input type="number" id="age" placeholder="25">
          </div>

          <div class="field">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="170">
          </div>

          <div class="field">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="70">
          </div>
        </div>
      </div>

      <!-- CHAT -->
      <div id="chat-box" class="chat-box"></div>

      <div class="chips">
        <button class="chip">Aku ingin menurunkan berat badan</button>
        <button class="chip">Buatkan meal plan sehat</button>
        <button class="chip">Latihan untuk pemula</button>
      </div>

      <!-- INPUT -->
      <form id="chat-form" class="chat-form">
        <input 
          type="text" 
          id="user-input" 
          placeholder="Ceritakan kondisi atau target kesehatanmu..." 
          autocomplete="off" 
        />
        <button type="submit">Send</button>
      </form>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
